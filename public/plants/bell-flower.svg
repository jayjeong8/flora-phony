  <path d="M15 32C12 30.5 9.5 30 9 31.5C10 33 12.5 33.5 15 33Z" fill="#9B7DB8" opacity="0.4"/>
  <!-- Leaf vein -->
  <path d="M14.5 32.5C12.5 31.5 10.5 31 9.5 31.5" stroke="#9B7DB8" stroke-width="0.35" stroke-linecap="round" opacity="0.25"/>
