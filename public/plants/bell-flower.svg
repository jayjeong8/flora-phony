  <path d="M16 14C16 14 11 12 11 8C11 6 13 5 16 7C19 5 21 6 21 8C21 12 16 14 16 14Z" fill="#E8D5F0" opacity="0.4"/>
  <!-- Bell flower head — top highlight -->
