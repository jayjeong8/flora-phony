  <!-- Petal veins (thin strokes from center outward) -->
  <path d="M16 8C14 7 11 8.5 9 10" stroke="#9B7DB8" stroke-width="0.4" stroke-linecap="round" opacity="0.25"/>
  <path d="M16 8C18 7 21 8.5 23 10" stroke="#9B7DB8" stroke-width="0.4" stroke-linecap="round" opacity="0.2"/>
  <path d="M16 8C15 10 14 12 14.5 14" stroke="#9B7DB8" stroke-width="0.35" stroke-linecap="round" opacity="0.2"/>
  <path d="M16 8C17 10 18 12 17.5 14" stroke="#9B7DB8" stroke-width="0.35" stroke-linecap="round" opacity="0.18"/>
  <!-- Center -->
  <circle cx="16" cy="8" r="2" fill="#E8D5F0"/>
  <circle cx="16" cy="8" r="0.8" fill="#9B7DB8" opacity="0.6"/>
  <!-- Side bud stems (C curves) -->
  <path d="M13 26C11 24 9 23 7 22" stroke="#9B7DB8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M19.5 25C21.5 23.5 23 22.5 25.5 22.5" stroke="#9B7DB8" stroke-width="1.4" stroke-linecap="round"/>
