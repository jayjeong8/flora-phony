  <path d="M7 22C5.5 20 5 18.5 7 17.5C9 19 8.5 20.5 7 22Z" fill="#C9A0DC" opacity="0.7"/>
  <path d="M25.5 22.5C24 20 23.5 18 25.5 17.5C27.5 19.5 27 21 25.5 22.5Z" fill="#C9A0DC" opacity="0.65"/>
