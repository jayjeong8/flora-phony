<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40" fill="none">
  <!-- Glow halo -->
  <circle cx="16" cy="4" r="3.5" fill="#C45B28" opacity="0.15"/>
  <!-- Inner glow halo -->
  <circle cx="16" cy="4" r="2.2" fill="#D98A60" opacity="0.18"/>
  <!-- Main stem (gentle C curve) -->
  <path d="M16 38C15.5 30 16.5 20 16 8" stroke="#C45B28" stroke-width="2" stroke-linecap="round"/>
  <!-- Stem highlight -->
  <path d="M16.3 36C15.8 28 16.8 19 16.3 10" stroke="#D98A60" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
  <!-- Ember flame tip — shadow -->
  <path d="M16.5 9C14.5 6 14.5 3.5 16.5 1.5C18.5 3.5 18.5 6 16.5 9Z" fill="#C45B28" opacity="0.2"/>
  <!-- Ember flame tip — base -->
  <path d="M16 8C14 5 14 3 16 1C18 3 18 5 16 8Z" fill="#C45B28" opacity="0.85"/>
  <!-- Ember flame tip — mid highlight -->
  <path d="M16 7C15 5 15 3.5 16 2C17 3.5 17 5 16 7Z" fill="#D98A60" opacity="0.45"/>
  <!-- Ember flame tip — top highlight -->
  <path d="M16 5.5C15.5 4.5 15.5 3.5 16 2.5C16.5 3.5 16.5 4.5 16 5.5Z" fill="#D98A60" opacity="0.6"/>
  <!-- Thorn pair 1 — left (C beziers, with barb) -->
  <path d="M16 14C13 11 11 10 9.5 10.5C11 12 13.5 13.5 16 14Z" fill="#C45B28" opacity="0.75"/>
  <path d="M15.5 13.5C13.5 11.5 12 11 10.5 11.5C12 12.5 14 13.5 15.5 14Z" fill="#D98A60" opacity="0.3"/>
  <!-- Barb on thorn 1 -->
  <path d="M11 10.8L10 9.5" stroke="#C45B28" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Thorn pair 2 — right (slightly larger, asymmetric) -->
  <path d="M16 20C19.5 17 22 16 23 16.5C21 18 18.5 19.5 16 20Z" fill="#C45B28" opacity="0.7"/>
  <path d="M16.5 19.5C19 17.5 21 17 22 17.5C20.5 18.5 18.5 19.5 16.5 20Z" fill="#D98A60" opacity="0.3"/>
  <!-- Barb on thorn 2 -->
  <path d="M21.5 16.8L22.5 15.5" stroke="#C45B28" stroke-width="0.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Thorn pair 3 — left -->
  <path d="M16 26C12.5 23 10 22 9 22.5C10.5 24 13 25.5 16 26Z" fill="#C45B28" opacity="0.65"/>
  <!-- Barb on thorn 3 -->
  <path d="M10.5 22.8L9.5 21.5" stroke="#C45B28" stroke-width="0.4" stroke-linecap="round" opacity="0.4"/>
  <!-- Thorn pair 4 — right -->
  <path d="M16 32C19.5 29 22.5 28.5 23.5 29C21.5 30.5 18.5 31.5 16 32Z" fill="#C45B28" opacity="0.6"/>
  <!-- Barb on thorn 4 -->
  <path d="M22 29L23 28" stroke="#C45B28" stroke-width="0.4" stroke-linecap="round" opacity="0.35"/>
  <!-- Tip embers (asymmetric sizes) -->
  <circle cx="9.5" cy="10.5" r="1.3" fill="#D98A60" opacity="0.55"/>
  <circle cx="23" cy="16.5" r="1.1" fill="#D98A60" opacity="0.5"/>
  <circle cx="9" cy="22.5" r="0.9" fill="#D98A60" opacity="0.4"/>
  <circle cx="23.5" cy="29" r="0.8" fill="#D98A60" opacity="0.35"/>
  <!-- Base ember glow -->
  <circle cx="16" cy="36" r="2.5" fill="#C45B28" opacity="0.08"/>
  <circle cx="16" cy="36" r="1.5" fill="#C45B28" opacity="0.12"/>
  <!-- Ground plane -->
  <ellipse cx="16" cy="38" rx="3" ry="1" fill="#C45B28" opacity="0.2"/>
</svg>